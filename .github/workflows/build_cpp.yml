name: Build Windows EXE (Static + libiio.dll)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-qt5 mingw-w64-x86_64-libiio mingw-w64-x86_64-make base-devel
    - name: Configure
      shell: msys2 {0}
      run: |
        mkdir build && cd build
        cmake .. -G "Unix Makefiles" -DCMAKE_PREFIX_PATH=/mingw64 -DCMAKE_BUILD_TYPE=Release
    - name: Build
      shell: msys2 {0}
      run: |
        cd build
        make -j4
    - name: Copy libiio.dll
      shell: msys2 {0}
      run: |
        mkdir dist
        cp build/FPV_Hunter_Pro.exe dist/
        cp /mingw64/bin/libiio.dll dist/ || true
        cp /mingw64/bin/libxml2-*.dll dist/ || true
        cp /mingw64/bin/liblzma-*.dll dist/ || true
        cp /mingw64/bin/libzstd-*.dll dist/ || true
        cp /mingw64/bin/libbrotli*.dll dist/ || true
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: FPV_Hunter_Pro_Static
        path: dist/*
